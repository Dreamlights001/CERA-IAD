weights_root: ${IAD_WEIGHTS:-weights/cache}
download_backend: huggingface-cli

models:
  clip_vit_l_14:
    group: basic
    required_for:
      - A0_clip_only
      - A1_aa_clip_candidate
      - A2_memory_rarity
      - A3_conformal_gate
      - A4_sam_mask
      - A5_mllm_reflection
      - A6_full_cera_iad
    hf_repo: openai/clip-vit-large-patch14
    target_dir: clip/openai-clip-vit-large-patch14
    note: Shared CLIP backbone; also usable by open_clip adapters.

  dinov2_large:
    group: optional
    required_for:
      - encoder_swap_dinov2_large
    hf_repo: facebook/dinov2-large
    target_dir: dinov2/facebook-dinov2-large
    note: Language-free encoder ablation.

  sam_vit_h:
    group: basic
    required_for:
      - A4_sam_mask
      - A5_mllm_reflection
      - A6_full_cera_iad
    hf_repo: facebook/sam-vit-huge
    target_dir: sam/facebook-sam-vit-huge
    note: SAM box/point prompt mask refinement.

  sam2_1_hiera_large:
    group: optional
    required_for:
      - mask_swap_sam2_box
    hf_repo: facebook/sam2.1-hiera-large
    target_dir: sam2/facebook-sam2.1-hiera-large
    note: SAM2.1 mask refinement ablation.

  qwen25_vl_7b:
    group: mllm
    required_for:
      - A5_mllm_reflection
      - A6_full_cera_iad
    hf_repo: Qwen/Qwen2.5-VL-7B-Instruct
    target_dir: mllm/Qwen2.5-VL-7B-Instruct
    note: Default evidence reflection model. Large download.

  internvl25_8b:
    group: mllm
    required_for:
      - reasoner_swap_internvl25
    hf_repo: OpenGVLab/InternVL2_5-8B
    target_dir: mllm/InternVL2_5-8B
    note: Optional MLLM reasoner ablation.

  anomaly_vfm_optional:
    group: optional
    required_for:
      - encoder_swap_anomaly_vfm
    hf_repo: null
    target_dir: anomaly_vfm
    note: Follow ../baselines/AnomalyVFM README if upstream releases separate checkpoints.
