method: CERA-IAD
description: Cloud-only configuration for modular CERA-IAD experiments.

runtime:
  device: cuda
  seed: 20260608
  precision: fp16
  num_workers: 8
  local_execution_policy: dry_run_only

paths:
  repo_root: ${IAD_ROOT:-/workspace/IAD/code/CERA-IAD}
  weights_root: ${IAD_WEIGHTS:-/workspace/IAD/code/CERA-IAD/weights/cache}
  data_root: ${IAD_DATA:-/data/iad}
  output_root: ${IAD_OUTPUTS:-/workspace/IAD/outputs/cera_cloud}
  baselines_root: ${IAD_BASELINES:-/workspace/IAD/code/baselines}

data:
  primary_benchmarks:
    - mvtec_ad_2
    - real_iad
    - mmad
    - m3_ad
  auxiliary_benchmarks:
    - mvtec_ad
    - visa
    - mvtec_loco_ad
    - real_iad_d3
    - mvtec_3d_ad
  splits:
    normal_memory: train_normal
    calibration: val_normal
    test: test
  dataset_paths:
    mvtec_ad: ${IAD_DATA:-/data/iad}/MVTec-AD
    mvtec_ad_2: ${IAD_DATA:-/data/iad}/MVTec-AD-2
    visa: ${IAD_DATA:-/data/iad}/VisA
    real_iad: ${IAD_DATA:-/data/iad}/Real-IAD
    mmad: ${IAD_DATA:-/data/iad}/MMAD
    m3_ad: ${IAD_DATA:-/data/iad}/M3-AD

modules:
  encoder: clip_openai
  candidate_generator: aa_clip
  memory_backend: exact_knn
  mask_refiner: sam_box
  reasoner: no_reasoner
  calibrator: conformal_global
  fusion_scorer: linear_fusion

scoring:
  semantic: 0.30
  rarity: 0.40
  disagreement: 0.20
  uncertainty: 0.10
  retrieval_k: 5
  conformal:
    epsilon: 0.05
    abstention_margin: 0.05
  reflection:
    disagreement_threshold: 0.35
    uncertainty_threshold: 0.50

artifacts:
  memory_features: ${IAD_OUTPUTS:-/workspace/IAD/outputs/cera_cloud}/features/normal_memory.npy
  calibration_scores: ${IAD_OUTPUTS:-/workspace/IAD/outputs/cera_cloud}/calibration/normal_scores.json
  proposals_dir: ${IAD_OUTPUTS:-/workspace/IAD/outputs/cera_cloud}/proposals
  evidence_dir: ${IAD_OUTPUTS:-/workspace/IAD/outputs/cera_cloud}/evidence
  metrics_dir: ${IAD_OUTPUTS:-/workspace/IAD/outputs/cera_cloud}/metrics

outputs:
  save_region_json: true
  save_reasoner_json: true
  save_visual_overlays: true
  save_retrieval_panels: true
